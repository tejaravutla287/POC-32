<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POC 32: Azure DevOps Deployment</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #0078d4;
        }
        h1 { color: #0078d4; }
        .status {
            display: inline-block;
            padding: 5px 15px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>POC 32: Deployment Successful</h1>
        <p>This Node.js application was built and deployed using:</p>
        <ul style="list-style: none; padding: 0;">
            <li>🚀 <strong>Azure DevOps Pipelines</strong></li>
            <li>☁️ <strong>Azure App Service (Linux)</strong></li>
            <li>🛡️ <strong>Azure Key Vault</strong></li>
        </ul>
        <div class="status">Pipeline Status: Active</div>
    </div>
</body>
</html>
